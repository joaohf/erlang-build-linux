name: erlang-build

on:
  workflow_dispatch:
  # push:

permissions:
  contents: write

jobs:
  qemu:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [amd64, arm64]
        clib: [glibc, musl]
        erlang_version: [maint-29, maint-28]

    permissions:
      packages: read

    env:
      BUILD_NAME: erlang-${{ matrix.erlang_version }}-${{ matrix.clib }}-${{ matrix.platform }}

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Clone erlang-build-linux
        uses: actions/checkout@v6
        # with:
        #   path: erlang-build-linux

      - name: Make folders
        run: |
          mkdir -p ${{ github.workspace }}

      - name: Run command in container
        uses: addnab/docker-run-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          image: ghcr.io/joaohf/erlang-build:latest-${{ matrix.clib }}
          options: --platform linux/${{ matrix.platform }} --workdir /github/workspace -v ${{ github.workspace }}:/github/workspace
          run: |
            bash scripts/build_otp.bash ${{ matrix.erlang_version }} ${{ env.BUILD_NAME }}

      - name: Archive Erlang/OTP build
        uses: actions/upload-artifact@v7
        with:
          name: erlang-otp-${{ matrix.erlang_version }}-${{ matrix.clib }}-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/tmp/otp_builds/${{ env.BUILD_NAME }}.tar.gz
            ${{ github.workspace }}/tmp/otp_builds/${{ env.BUILD_NAME }}.tar.gz.sha256
          archive: true
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest

    needs: qemu

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: vlatest
          name: Erlang Build (Latest)
          draft: false
          prerelease: true
          files: artifacts/*/*